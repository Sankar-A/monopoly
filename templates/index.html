<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Online</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }

#lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
#lobby h1 { font-size: 2.5rem; color: #e94560; }
#lobby input { padding: 10px 16px; border-radius: 8px; border: none; font-size: 1rem; width: 240px; background: #16213e; color: #eee; }
#lobby button { padding: 10px 24px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 1rem; cursor: pointer; }
#lobby button:hover { background: #c73652; }
.lobby-row { display: flex; gap: 8px; }
#error-msg { color: #ff6b6b; font-size: 0.9rem; }

#game { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
#top-bar { background: #16213e; padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
#top-bar h2 { color: #e94560; font-size: 1.1rem; }
#room-label { font-size: 0.85rem; color: #aaa; }
#main-area { display: flex; flex: 1; overflow: hidden; }

/* Board */
#board-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; overflow: auto; }
#board { display: grid; grid-template-columns: 80px repeat(9, 56px) 80px; grid-template-rows: 80px repeat(9, 56px) 80px; background: #c8e6c9; border: 3px solid #333; position: relative; }
.tile { border: 1px solid #555; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.45rem; text-align: center; padding: 2px; position: relative; background: #c8e6c9; color: #111; overflow: hidden; cursor: default; }
.tile .tile-name { font-weight: bold; line-height: 1.1; }
.tile .tile-price { color: #333; }
.tile-color-bar { width: 100%; height: 10px; }
.corner { font-size: 0.55rem; font-weight: bold; }
.tile-players { display: flex; flex-wrap: wrap; gap: 1px; justify-content: center; margin-top: 2px; }
.token { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }
.house-count { font-size: 0.5rem; color: #1a5c1a; font-weight: bold; }

/* Center of board */
#board-center { grid-column: 2 / 11; grid-row: 2 / 11; background: #c8e6c9; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
#board-center h1 { font-size: 2rem; color: #1a5c1a; font-style: italic; transform: rotate(-30deg); }
#dice-display { font-size: 2rem; }
#center-log { font-size: 0.65rem; color: #333; max-width: 300px; text-align: center; max-height: 80px; overflow: hidden; }

/* Side panel */
#side-panel { width: 280px; background: #16213e; display: flex; flex-direction: column; overflow: hidden; }
#players-list { padding: 8px; border-bottom: 1px solid #333; }
#players-list h3 { font-size: 0.85rem; color: #e94560; margin-bottom: 6px; }
.player-card { background: #0f3460; border-radius: 6px; padding: 6px 8px; margin-bottom: 4px; font-size: 0.8rem; }
.player-card.active { border: 2px solid #e94560; }
.player-card .pname { font-weight: bold; }
.player-card .pmoney { color: #4caf50; }
.player-card .ppos { color: #aaa; font-size: 0.7rem; }

#actions { padding: 8px; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 6px; }
#actions h3 { font-size: 0.85rem; color: #e94560; }
.btn { padding: 7px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #c73652; }
.btn-secondary { background: #0f3460; color: #eee; }
.btn-secondary:hover { background: #1a4a80; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

#log-panel { flex: 1; padding: 8px; overflow-y: auto; }
#log-panel h3 { font-size: 0.85rem; color: #e94560; margin-bottom: 6px; }
.log-entry { font-size: 0.72rem; color: #ccc; padding: 2px 0; border-bottom: 1px solid #1a2a4a; }

#properties-panel { padding: 8px; border-top: 1px solid #333; max-height: 160px; overflow-y: auto; }
#properties-panel h3 { font-size: 0.85rem; color: #e94560; margin-bottom: 4px; }
.prop-item { font-size: 0.72rem; display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
.prop-item button { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; border: none; background: #4caf50; color: #fff; cursor: pointer; }

#winner-banner { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
#winner-banner div { background: #16213e; padding: 40px; border-radius: 16px; text-align: center; }
#winner-banner h2 { font-size: 2rem; color: #e94560; margin-bottom: 16px; }

/* Color bars */
.brown { background: #8B4513; }
.light_blue { background: #87CEEB; }
.pink { background: #FF69B4; }
.orange { background: #FFA500; }
.red { background: #FF0000; }
.yellow { background: #FFD700; }
.green { background: #008000; }
.dark_blue { background: #00008B; }
</style>
</head>
<body>

<!-- Lobby -->
<div id="lobby">
  <h1>🎩 Monopoly Online</h1>
  <input id="player-name" placeholder="Your name" maxlength="16" />
  <div class="lobby-row">
    <button onclick="createRoom()">Create Room</button>
  </div>
  <div class="lobby-row">
    <input id="room-code" placeholder="Room code" maxlength="6" style="width:120px;text-transform:uppercase" />
    <button onclick="joinRoom()">Join Room</button>
  </div>
  <div id="error-msg"></div>
</div>

<!-- Game -->
<div id="game">
  <div id="top-bar">
    <h2>🎩 Monopoly Online</h2>
    <span id="room-label"></span>
    <span id="turn-label" style="color:#4caf50;font-size:0.85rem;"></span>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-primary" id="btn-start" onclick="startGame()" style="display:none">Start Game</button>
    </div>
  </div>
  <div id="main-area">
    <div id="board-wrap">
      <div id="board"></div>
    </div>
    <div id="side-panel">
      <div id="players-list"><h3>Players</h3><div id="players-container"></div></div>
      <div id="actions">
        <h3>Actions</h3>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-roll" onclick="rollDice()" disabled>Roll Dice</button>
          <button class="btn btn-secondary" id="btn-jail-free" onclick="useJailFree()" style="display:none">Use Jail Card</button>
        </div>
        <div class="btn-row" id="buy-actions" style="display:none">
          <button class="btn btn-primary" id="btn-buy" onclick="buyProperty()">Buy</button>
          <button class="btn btn-secondary" id="btn-decline" onclick="declineBuy()">Decline</button>
        </div>
      </div>
      <div id="log-panel"><h3>Game Log</h3><div id="log-container"></div></div>
      <div id="properties-panel"><h3>My Properties</h3><div id="my-properties"></div></div>
    </div>
  </div>
</div>

<div id="winner-banner">
  <div>
    <h2 id="winner-text"></h2>
    <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

<script>
const socket = io();
let myId = null;
let roomId = null;
let gameState = null;

const PLAYER_COLORS = ['#e94560','#4caf50','#2196f3','#ff9800','#9c27b0','#00bcd4'];

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
}

function createRoom() {
  const name = document.getElementById('player-name').value.trim() || 'Player';
  socket.emit('create_room', { name });
}

function joinRoom() {
  const name = document.getElementById('player-name').value.trim() || 'Player';
  const code = document.getElementById('room-code').value.trim().toUpperCase();
  if (!code) { showError('Enter a room code'); return; }
  socket.emit('join_room_game', { name, room_id: code });
}

function startGame() {
  socket.emit('start_game', { room_id: roomId });
}

function rollDice() {
  socket.emit('roll_dice', { room_id: roomId });
}

function buyProperty() {
  socket.emit('buy_property', { room_id: roomId });
}

function declineBuy() {
  socket.emit('decline_buy', { room_id: roomId });
}

function useJailFree() {
  socket.emit('use_jail_free', { room_id: roomId });
}

function buyHouse(pos) {
  socket.emit('buy_house', { room_id: roomId, pos });
}

socket.on('room_created', (data) => {
  myId = data.player_id;
  roomId = data.room_id;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('room-label').textContent = `Room: ${roomId}`;
  document.getElementById('btn-start').style.display = 'inline-block';
});

socket.on('room_joined', (data) => {
  myId = data.player_id;
  roomId = data.room_id;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('room-label').textContent = `Room: ${roomId}`;
});

socket.on('error', (data) => {
  showError(data.msg);
});

socket.on('game_state', (state) => {
  gameState = state;
  renderGame(state);
});

function renderGame(state) {
  // Winner check
  if (state.winner) {
    document.getElementById('winner-text').textContent = `🏆 ${state.winner} wins!`;
    document.getElementById('winner-banner').style.display = 'flex';
    return;
  }

  const isMyTurn = state.current_player === myId;
  const me = state.players[myId];

  // Turn label
  const cp = state.players[state.current_player];
  document.getElementById('turn-label').textContent = state.started
    ? `Current turn: ${cp ? cp.name : ''}${isMyTurn ? ' (You)' : ''}`
    : 'Waiting to start...';

  // Start button
  document.getElementById('btn-start').style.display =
    !state.started ? 'inline-block' : 'none';

  // Roll button
  document.getElementById('btn-roll').disabled =
    !state.started || !isMyTurn || !!state.waiting_for_action;

  // Buy actions
  document.getElementById('buy-actions').style.display =
    isMyTurn && state.waiting_for_action === 'buy' ? 'flex' : 'none';

  // Jail free card
  if (me && me.in_jail && me.jail_free_cards > 0) {
    document.getElementById('btn-jail-free').style.display = 'inline-block';
  } else {
    document.getElementById('btn-jail-free').style.display = 'none';
  }

  // Players list
  const pc = document.getElementById('players-container');
  pc.innerHTML = '';
  state.player_order.forEach((pid, i) => {
    const p = state.players[pid];
    if (!p || p.bankrupt) return;
    const div = document.createElement('div');
    div.className = 'player-card' + (pid === state.current_player ? ' active' : '');
    div.style.borderLeft = `4px solid ${PLAYER_COLORS[i % PLAYER_COLORS.length]}`;
    div.innerHTML = `<div class="pname">${p.name}${pid === myId ? ' (You)' : ''}</div>
      <div class="pmoney">$${p.money}</div>
      <div class="ppos">${state.board[p.position]?.name || ''} ${p.in_jail ? '🔒' : ''}</div>`;
    pc.appendChild(div);
  });

  // Log
  const lc = document.getElementById('log-container');
  lc.innerHTML = state.log.slice().reverse().map(l =>
    `<div class="log-entry">${l}</div>`).join('');

  // My properties
  const mp = document.getElementById('my-properties');
  mp.innerHTML = '';
  if (me) {
    me.properties.forEach(pos => {
      const tile = state.board[pos];
      const houses = state.houses[pos] || 0;
      const div = document.createElement('div');
      div.className = 'prop-item';
      const houseLabel = houses === 5 ? '🏨' : houses > 0 ? '🏠'.repeat(houses) : '';
      div.innerHTML = `<span>${tile.name} ${houseLabel}</span>`;
      if (tile.type === 'property') {
        const btn = document.createElement('button');
        btn.textContent = '+House';
        btn.onclick = () => buyHouse(pos);
        div.appendChild(btn);
      }
      mp.appendChild(div);
    });
  }

  // Board
  renderBoard(state);
}

function renderBoard(state) {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Build player position map
  const playerPositions = {};
  state.player_order.forEach((pid, i) => {
    const p = state.players[pid];
    if (!p || p.bankrupt) return;
    if (!playerPositions[p.position]) playerPositions[p.position] = [];
    playerPositions[p.position].push({ pid, color: PLAYER_COLORS[i % PLAYER_COLORS.length] });
  });

  // Board layout: 40 tiles around the edge
  // Row 0: tiles 20-30 (bottom row, right to left: 30,29,...,20)
  // Col 11: tiles 10-20 (right col, bottom to top: 10,11,...,20)
  // Row 11: tiles 0-10 (top row, left to right: 0,1,...,10)
  // Col 0: tiles 30-40 (left col, top to bottom: 40,39,...,30)

  // We'll place tiles in a 12x12 grid
  // Bottom row (row 11): positions 20..30 left to right
  // Right col (col 11): positions 10..20 bottom to top
  // Top row (row 0): positions 0..10 left to right
  // Left col (col 0): positions 30..40/0 top to bottom

  const gridPositions = {}; // tile index -> {row, col}

  // Top row: 0..10 left to right (row 0, col 0..10)
  for (let i = 0; i <= 10; i++) gridPositions[i] = { row: 0, col: i };
  // Right col: 11..19 top to bottom (col 10, row 1..9)
  for (let i = 11; i <= 19; i++) gridPositions[i] = { row: i - 10, col: 10 };
  // Bottom row: 20..30 right to left (row 10, col 10..0)
  for (let i = 20; i <= 30; i++) gridPositions[i] = { row: 10, col: 30 - i };
  // Left col: 31..39 bottom to top (col 0, row 9..1)
  for (let i = 31; i <= 39; i++) gridPositions[i] = { row: 40 - i, col: 0 };

  // Create center
  const center = document.createElement('div');
  center.id = 'board-center';
  center.style.gridColumn = '2 / 11';
  center.style.gridRow = '2 / 11';
  const d1 = state.dice[0], d2 = state.dice[1];
  center.innerHTML = `<h1>MONOPOLY</h1>
    <div id="dice-display">${d1 ? dieFace(d1) + ' ' + dieFace(d2) : ''}</div>
    <div id="center-log">${state.log.slice(-3).join('<br>')}</div>`;
  board.appendChild(center);

  // Render tiles
  for (let i = 0; i < 40; i++) {
    const tile = state.board[i];
    const gp = gridPositions[i];
    const div = document.createElement('div');
    div.className = 'tile';
    if (i === 0 || i === 10 || i === 20 || i === 30) div.classList.add('corner');
    div.style.gridColumn = (gp.col + 1) + '';
    div.style.gridRow = (gp.row + 1) + '';

    let html = '';
    if (tile.color) {
      html += `<div class="tile-color-bar ${tile.color}"></div>`;
    }
    html += `<div class="tile-name">${tile.name}</div>`;
    if (tile.price) html += `<div class="tile-price">$${tile.price}</div>`;

    // Houses
    const houses = state.houses[i] || 0;
    if (houses > 0) {
      html += `<div class="house-count">${houses === 5 ? '🏨' : '🏠x' + houses}</div>`;
    }

    // Owner indicator
    if (state.ownership[i]) {
      const ownerIdx = state.player_order.indexOf(state.ownership[i]);
      html += `<div style="width:8px;height:8px;border-radius:50%;background:${PLAYER_COLORS[ownerIdx % PLAYER_COLORS.length]};margin:1px auto;"></div>`;
    }

    // Players on this tile
    const here = playerPositions[i] || [];
    if (here.length > 0) {
      html += '<div class="tile-players">';
      here.forEach(({ color }) => {
        html += `<div class="token" style="background:${color}"></div>`;
      });
      html += '</div>';
    }

    div.innerHTML = html;
    board.appendChild(div);
  }
}

function dieFace(n) {
  return ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'][n] || n;
}
</script>
</body>
</html>
